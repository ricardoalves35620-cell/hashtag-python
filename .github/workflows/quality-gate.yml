name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, tests, build and content audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integrity tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Bilingual content audit
        env:
          HP_AUDIT_CONTENT_OUTPUT: playwright-report/content-audit.json
        run: npm run audit:content

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-evidence-${{ github.run_number }}
          path: playwright-report/content-audit.json
          if-no-files-found: warn
          retention-days: 14
